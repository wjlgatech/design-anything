# Influential figures & labs — inclusion requires survival evidence, not fame.
# kind: person | lab | company

- name: Gramazio Kohler Research (ETH Zurich)
  url: https://gramaziokohler.arch.ethz.ch/
  blurb: Invented "digital fabrication in architecture" as a discipline (2005); alumni seeded labs worldwide.
  kind: lab
  domain: architecture

- name: Block Research Group (ETH Zurich)
  url: https://block.arch.ethz.ch/
  blurb: Philippe Block — compression-only structures, 3D-printed floors, and the open-source COMPAS framework.
  kind: lab
  domain: architecture

- name: Ole Sigmund (DTU TopOpt)
  url: https://www.topopt.mek.dtu.dk/
  blurb: Topology optimization's living anchor; the group's free codes are the field's curriculum.
  kind: person
  domain: structural-optimization

- name: NVIDIA Research
  url: https://research.nvidia.com/
  blurb: Instant-NGP, Kaolin, Omniverse/OpenUSD, Warp — the graphics/simulation engine room.
  kind: lab
  domain: simulation

- name: IAAC Barcelona
  url: https://iaac.net/
