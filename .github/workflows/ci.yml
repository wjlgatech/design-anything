name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml pytest
      - run: make check

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link check (README + docs)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --accept 200,202,206,403,405,406,415,429
            README.md CONTRIBUTING.md GOAL.md
        continue-on-error: true
