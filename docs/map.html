<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>design-anything — knowledge map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --bg:#faf9f5; --ink:#141413; --line:#b0aea5; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:Poppins,ui-sans-serif,system-ui,-apple-system,Arial,sans-serif; }
  header { padding:12px 18px; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:baseline; flex-wrap:wrap; }
  h1 { font-size:16px; margin:0; }
  #legend { font-size:12px; color:#555; }
  #legend span { margin-right:12px; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:4px; }
  canvas { display:block; width:100vw; height:calc(100vh - 49px); cursor:grab; }
  #tip { position:fixed; pointer-events:none; background:var(--ink); color:var(--bg);
         padding:4px 8px; border-radius:4px; font-size:12px; display:none; max-width:320px; }
</style>
</head>
<body>
<header>
  <h1>design-anything — knowledge map</h1>
  <div id="legend"></div>
</header>
<canvas id="c"></canvas>
<div id="tip"></div>
<script>
const COLORS = { root:"#141413", gate:"#d97757", skill:"#6a9bcc", tool:"#788c5d",
                 paper:"#8a7ba8", person:"#c2846b", lab:"#c2846b", company:"#c2846b",
                 category:"#b0aea5", domain:"#b0aea5" };
const R = { root:14, gate:9, skill:7, category:6, domain:6 };
fetch("graph.json").then(r => r.json()).then(init).catch(() =>
  document.querySelector("header h1").textContent =
    "graph.json not reachable — serve this folder (python3 -m http.server) or view on GitHub Pages");

function init(g) {
  const legend = document.getElementById("legend");
  ["root","gate","skill","tool","paper","person","category/domain"].forEach(k => {
    legend.innerHTML += `<span><i class="dot" style="background:${COLORS[k.split("/")[0]]}"></i>${k}</span>`;
  });
  const canvas = document.getElementById("c"), tip = document.getElementById("tip");
  const ctx = canvas.getContext("2d");
  const nodes = g.nodes.map((n,i) => ({...n,
    x: Math.cos(i*2.399)* (120 + 8*i%300), y: Math.sin(i*2.399)*(120 + 8*i%300), vx:0, vy:0}));
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  const edges = g.edges.filter(e => byId[e.source] && byId[e.target]);
  let ox=0, oy=0, scale=1, drag=null, hover=null;

  function resize(){ canvas.width=innerWidth*devicePixelRatio; canvas.height=(innerHeight-49)*devicePixelRatio; }
  addEventListener("resize", resize); resize();

  function step() {
    for (const e of edges) {           // springs
      const a=byId[e.source], b=byId[e.target];
      const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||1, f=(d-80)*0.004;
      a.vx+=f*dx/d; a.vy+=f*dy/d; b.vx-=f*dx/d; b.vy-=f*dy/d;
    }
    for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {   // repulsion
      const a=nodes[i], b=nodes[j];
      const dx=b.x-a.x, dy=b.y-a.y, d2=dx*dx+dy*dy+0.01;
      if (d2 < 40000) { const f=600/d2; a.vx-=f*dx; a.vy-=f*dy; b.vx+=f*dx; b.vy+=f*dy; }
    }
    for (const n of nodes) { n.vx*=0.85; n.vy*=0.85; n.x+=n.vx; n.y+=n.vy; }
  }

  function draw() {
    step();
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    ctx.clearRect(0,0,innerWidth,innerHeight);
    ctx.save();
    ctx.translate(innerWidth/2+ox, (innerHeight-49)/2+oy); ctx.scale(scale,scale);
    ctx.strokeStyle="#d8d6cc";
    for (const e of edges) { const a=byId[e.source], b=byId[e.target];
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, (R[n.kind]||5)*(n===hover?1.6:1), 0, 7);
      ctx.fillStyle = COLORS[n.kind] || "#788c5d"; ctx.fill();
      if (["root","gate","domain","category","skill"].includes(n.kind)) {
        ctx.fillStyle="#141413"; ctx.font="10px sans-serif";
        ctx.fillText(n.label || n.id, n.x+8, n.y+3);
      }
    }
    ctx.restore();
    requestAnimationFrame(draw);
  }
  draw();

  function pick(ev) {
    const x=(ev.clientX-innerWidth/2-ox)/scale, y=(ev.clientY-49-(innerHeight-49)/2-oy)/scale;
    return nodes.find(n => Math.hypot(n.x-x, n.y-y) < 12);
  }
  canvas.onmousemove = ev => {
    if (drag) { ox+=ev.movementX; oy+=ev.movementY; return; }
    hover = pick(ev);
    tip.style.display = hover ? "block" : "none";
    if (hover) { tip.textContent = `${hover.id}${hover.tier ? " · "+hover.tier : ""} (${hover.kind})`;
                 tip.style.left = ev.clientX+12+"px"; tip.style.top = ev.clientY+12+"px"; }
  };
  canvas.onmousedown = () => drag = true;
  canvas.onmouseup = ev => { drag = null; const n = pick(ev); if (n && n.url) open(n.url, "_blank"); };
  canvas.onwheel = ev => { ev.preventDefault(); scale *= ev.deltaY < 0 ? 1.1 : 0.9; };
}
</script>
</body>
</html>
